<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI 资讯聚合 - 实时追踪人工智能与技术动态 / AI News Aggregator - Real-time AI & Tech News">
  <meta name="theme-color" content="#6366f1">
  <title>AI 资讯聚合 / AI News</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-left">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="url(#logo-grad)"/>
            <text x="14" y="20" text-anchor="middle" fill="white" font-size="16" font-weight="bold">AI</text>
            <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
          </svg>
          <h1>AI 资讯聚合 <span class="title-en">AI News</span></h1>
        </div>
      </div>
      <div class="header-right">
        <span class="update-status" id="updateStatus">
          <span class="status-dot"></span>
          <span id="lastUpdated">加载中...</span>
        </span>
        <button class="btn-icon" id="refreshBtn" title="刷新 / Refresh">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
      </div>
    </div>

    <div class="controls">
      <div class="tabs" id="viewTabs">
        <button class="tab active" data-view="ai">🤖 AI 聚焦 <span class="tab-en">AI Focus</span></button>
        <button class="tab" data-view="all">📡 全部资讯 <span class="tab-en">All News</span></button>
      </div>
      <div class="controls-right">
        <div class="time-filter" id="timeFilter">
          <button class="tab active" data-time="24h">🕐 24h</button>
          <button class="tab" data-time="all">📅 全部 All</button>
        </div>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索 Search..." autocomplete="off">
        </div>
      </div>
    </div>

    <div class="category-bar" id="categoryBar">
      <button class="cat-chip active" data-category="">全部 All</button>
    </div>
  </header>

  <main>
    <div class="stats-bar" id="statsBar"></div>
    <div class="news-grid" id="newsContainer">
      <div class="loading">
        <div class="spinner"></div>
        <p>正在加载最新资讯...</p>
        <p class="loading-sub">Fetching latest news...</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>
        <strong>添加你的 RSS / Add Your Feeds</strong>
        &mdash; 编辑 <code>feeds.json</code> 或放入 <code>feeds.opml</code> 文件
        &mdash; Edit <code>feeds.json</code> or place a <code>feeds.opml</code> file in the repo root
      </p>
      <p class="footer-meta">
        由 GitHub Actions 自动更新 &mdash; Automatically updated by GitHub Actions
      </p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
